<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rider / Delivery App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

.container {
  max-width: 950px;
  margin: auto;
  background: #fff;
  padding: 20px;
}

h1 {
  color: #ff9900;
}

.layout {
  display: flex;
  gap: 20px;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  border-right: 1px solid #ddd;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #f5f5f5;
  font-weight: bold;
  text-align: left;
  cursor: pointer;
}

.sidebar button.active {
  background: #ff9900;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 10px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 5px;
}

button.action {
  background: #ff9900;
  border: none;
  padding: 10px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.status {
  background: #eef5ff;
  padding: 10px;
  border-left: 4px solid #007bff;
}

.success {
  background: #e9ffe9;
  padding: 10px;
  border-left: 4px solid green;
}

.checklist label {
  display: block;
  margin: 6px 0;
}
</style>
</head>

<body>

<div class="container">
<h1>🛵 Rider Dashboard</h1>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <button class="active" onclick="showSection('license')">License Verification</button>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('delivery')">Delivery Flow</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- LICENSE -->
<div class="section active" id="license">
  <h2>License Verification</h2>

  <div class="card">
    <label>Driver’s License Upload</label>
    <input type="file"><br><br>

    <label>Vehicle Type</label>
    <select>
      <option>Motorbike</option>
      <option>Tricycle</option>
      <option>Van</option>
    </select>

    <button class="action" onclick="alert('Verification submitted')">
      Submit for Verification
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="section" id="dashboard">
  <h2>Rider Dashboard</h2>

  <div class="card">
    <strong>📦 Available Jobs:</strong> 2
  </div>

  <div class="card">
    <strong>💰 Earnings</strong>
    <p>Today: ₦15,000</p>
    <p>This Week: ₦95,000</p>
  </div>

  <div class="card checklist">
    <strong>🛡 Safety Checklist</strong>
    <label><input type="checkbox"> Helmet worn</label>
    <label><input type="checkbox"> Fire extinguisher available</label>
    <label><input type="checkbox"> Cylinder secured</label>
  </div>
</div>

<!-- DELIVERY FLOW -->
<div class="section" id="delivery">
  <h2>Delivery Flow</h2>

  <div class="card" id="jobCard">
    <p><strong>Order #2045</strong></p>
    <p>Pickup: ABC Gas Station</p>
    <p>Drop-off: Customer Location</p>

    <button class="action" onclick="acceptOrder(this)">
      Accept Order
    </button>
  </div>
</div>

</div>
</div>
</div>

<script>
function showSection(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

function acceptOrder(btn) {
  btn.parentElement.innerHTML = `
    <div class="status">🧭 Navigate to Vendor</div>
    <button class="action" onclick="scanCylinder(this)">
      Arrived at Vendor
    </button>
  `;
}

function scanCylinder(btn) {
  btn.parentElement.innerHTML = `
    <div class="status">📷 Scan Filled Cylinder</div>
    <button class="action" onclick="goCustomer(this)">
      Cylinder Scanned
    </button>
  `;
}

function goCustomer(btn) {
  btn.parentElement.innerHTML = `
    <div class="status">🏠 Navigate to Customer</div>
    <button class="action" onclick="collectEmpty(this)">
      Arrived at Customer
    </button>
  `;
}

function collectEmpty(btn) {
  btn.parentElement.innerHTML = `
    <div class="status">🔁 Empty Cylinder Collected</div>
    <button class="action" onclick="confirmDelivery(this)">
      Confirm Delivery
    </button>
  `;
}

function confirmDelivery(btn) {
  btn.parentElement.innerHTML = `
    <div class="success">
      ✔ Delivery Completed Successfully
    </div>
  `;
}
</script>

</body>
</html>
