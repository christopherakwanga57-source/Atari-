<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GasMart – Sign Up / Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 20px;
  border-radius: 6px;
}

h1 {
  text-align: center;
  color: #ff9900;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff9900;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.switch {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #007bff;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1 id="formTitle">Create Account</h1>

<!-- SIGN UP -->
<div id="signupForm">
  <input type="text" id="name" placeholder="Full Name" />
  <input type="tel" id="phone" placeholder="Phone Number" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <input type="text" id="address" placeholder="Address" />
  <input type="text" id="country" placeholder="Country" />
  <input type="text" id="state" placeholder="State" />

  <select id="accountType">
    <option value="">Select Account Type</option>
    <option value="customer">Customer</option>
    <option value="vendor">Gas Station Vendor</option>
    <option value="rider">Rider</option>
  </select>

  <button onclick="signup()">Create Account</button>
</div>

<!-- LOGIN -->
<div id="loginForm" class="hidden">
  <input type="email" id="loginEmail" placeholder="Email" />
  <input type="password" id="loginPassword" placeholder="Password" />
  <button onclick="login()">Login</button>
</div>

<div class="switch" onclick="toggleForm()">
  Already have an account? Login
</div>

</div>

<script>
let isSignup = true;

function toggleForm() {
  isSignup = !isSignup;
  document.getElementById("signupForm").classList.toggle("hidden");
  document.getElementById("loginForm").classList.toggle("hidden");
  document.getElementById("formTitle").innerText =
    isSignup ? "Create Account" : "Login";
  document.querySelector(".switch").innerText =
    isSignup ? "Already have an account? Login" : "Don't have an account? Sign Up";
}

function signup() {
  const accountType = document.getElementById("accountType").value;
  if (!accountType) {
    alert("Please select account type");
    return;
  }

  // Save user (demo)
  localStorage.setItem("accountType", accountType);
  redirectUser(accountType);
}

function login() {
  // In real app, fetch account type from backend
  const accountType = localStorage.getItem("accountType") || "customer";
  redirectUser(accountType);
}

function redirectUser(type) {
  if (type === "customer") {
    window.location.href = "index-client.html";
  } else if (type === "vendor") {
    window.location.href = "csg-vendor-home.html";
  } else if (type === "rider") {
    window.location.href = "index-rider.html";
  }
}
</script>

</body>
</html>
